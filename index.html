<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ZEROV — Portfolio</title>

  <link rel="stylesheet" href="tooplate-exhibit-style.css" />
</head>

<body>

<!-- ================= NAV ================= -->
<nav class="site-nav">
  <a href="index.html" class="nav__wordmark">
    ZEROV <span>/ Portfolio</span>
  </a>
</nav>

<!-- ================= HERO ================= -->
<header class="site-hero">
  <h1 class="hero__title">
    UE &<br><strong>Portfolio</strong>
  </h1>

  <p class="hero__desc">
    Unreal Engine · Digital Twin · GIS · 3D Visualization
  </p>
</header>

<!-- ================= FILTER ================= -->
<div class="gallery-filter-wrap">
  <div class="gallery-filter">
    <button class="filter__btn is-active" data-filter="all">All</button>
    <button class="filter__btn" data-filter="ue">UE</button>
    <button class="filter__btn" data-filter="digital_twin">Digital Twin</button>
    <button class="filter__btn" data-filter="gis">GIS</button>
    <button class="filter__btn" data-filter="modeling">3D</button>
  </div>
</div>

<!-- ================= GALLERY（自动生成） ================= -->
<main class="gallery" id="gallery"></main>

<!-- ================= LIGHTBOX（保留模板功能） ================= -->
<div class="lightbox" id="js-lightbox">
  <button id="js-lb-close">X</button>
  <img id="js-lb-image" src="" />
</div>

<!-- ================= JS 自动渲染 ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  fetch("images.json")
    .then(res => res.json())
    .then(data => {

      const gallery = document.getElementById("gallery");

      data.forEach(item => {

        const el = document.createElement("div");
        el.className = "gallery__item";

        // 分类
        el.setAttribute("data-category", item.category);

        // 大图
        el.setAttribute("data-full", item.file);

        // HTML内容
        el.innerHTML = `
          <img src="${item.file}" loading="lazy" alt="${item.title}">
          <div class="caption">
            <div class="title">${item.title}</div>
          </div>
        `;

        gallery.appendChild(el);

      });

    })
    .catch(err => {
      console.error("加载 images.json 失败：", err);
    });

});
</script>

<script src="tooplate-exhibit-script.js"></script>

</body>
</html>

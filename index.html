<!-- ================= NAV ================= -->

    <button class="filter__btn is-active" data-filter="all">All</button>

    <button class="filter__btn" data-filter="modeling">3D Modeling</button>

</div>

<!-- ================= GALLERY ================= -->
<main class="gallery" id="js-gallery">

  <!-- ========== UE 项目 ========== -->
  <div class="gallery__item" data-category="ue"
       data-full="images/ue_01.jpg"
       data-title="UE5 City Environment System"
       data-meta="UE5 · Lumen · 2025">

    <img src="images/ue_01_thumb.jpg" alt="" loading="lazy">

  </div>

  <div class="gallery__item" data-category="ue"
       data-full="images/ue_02.jpg"

  </div>

  </div>

  <!-- ========== GIS ========== -->

       data-full="images/gis_01.jpg"

       data-meta="GIS · QGIS · Data Viz">

    <img src="images/gis_01_thumb.jpg" alt="" loading="lazy">

  </div>

  <!-- ========== 3D Modeling ========== -->
  <div class="gallery__item" data-category="modeling"
       data-full="images/model_01.jpg"
       data-title="Hard Surface Prop Modeling"
       data-meta="Blender · Substance · 2025">

    <img src="images/model_01_thumb.jpg" alt="" loading="lazy">

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ZEROV — UE / Digital Twin Portfolio</title>

  <link rel="stylesheet" href="tooplate-exhibit-style.css" />
</head>

<body>

<!-- ================= NAV ================= -->
<nav class="site-nav">
  <a href="index.html" class="nav__wordmark">
    ZEROV <span>/ Portfolio</span>
  </a>

  <ul class="nav__links">
    <li><a href="#" class="nav__link--active">Gallery</a></li>
  </ul>
</nav>

<!-- ================= HERO ================= -->
<header class="site-hero">
  <h1 class="hero__title">
    UE &<br><strong>Portfolio</strong>
  </h1>

  <p class="hero__desc">
    Unreal Engine · Digital Twin · GIS · 3D Visualization
  </p>
</header>

<!-- ================= FILTER（保留结构，后续可扩展） ================= -->
<div class="gallery-filter-wrap">
  <div class="gallery-filter">
    <button class="filter__btn is-active" data-filter="all">All</button>
    <button class="filter__btn" data-filter="ue">UE</button>
    <button class="filter__btn" data-filter="digital_twin">Digital Twin</button>
    <button class="filter__btn" data-filter="gis">GIS</button>
    <button class="filter__btn" data-filter="modeling">3D</button>
  </div>
</div>

<!-- ================= GALLERY（自动生成） ================= -->
<main class="gallery" id="gallery">
  <!-- JS 自动插入内容 -->
</main>

<!-- ================= LIGHTBOX（保留原功能） ================= -->
<div class="lightbox" id="js-lightbox">
  <button id="js-lb-close">X</button>
  <img id="js-lb-image" src="" />
</div>

<!-- ================= 自动生成核心脚本 ================= -->
<script>
fetch('images.json')
  .then(res => res.json())
  .then(data => {

    const gallery = document.getElementById('gallery');

    data.forEach(item => {

      const div = document.createElement('div');
      div.className = "gallery__item";

      // 分类（用于筛选）
      div.setAttribute("data-category", item.category);

      // 点击放大用
      div.setAttribute("data-full", item.file);

      // 标题（可扩展 lightbox）
      div.setAttribute("data-title", item.title || "");

      // 内容
      div.innerHTML = `
        <img src="${item.file}" alt="${item.title || ''}" loading="lazy">
        <div class="caption">
          <div class="title">${item.title || ''}</div>
        </div>
      `;

      gallery.appendChild(div);
    });

  });
</script>

<!-- ================= 原模板JS（如果有就保留） ================= -->
<script src="tooplate-exhibit-script.js"></script>

</body>
</html>
